name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.15.10
      - run: ruff check src tests examples

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            stack: minimum
          - os: ubuntu-latest
            python: "3.12"
            stack: current
          - os: macos-latest
            python: "3.12"
            stack: current
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Pin supported-minimum numerical stack
        if: matrix.stack == 'minimum'
        run: >-
          pip install 'jax==0.4.38' 'jaxlib==0.4.38'
          'equinox>=0.11,<0.12' 'lineax>=0.0.7,<0.1'
      - run: python -c "import jax, solvax; print(jax.__version__, solvax.__version__, solvax.__file__)"
      - run: pytest -n auto --cov --cov-report=xml
      - name: Benchmark problem-suite verification
        if: matrix.stack == 'current'
        run: python -m benchmarks.benchmark_sweeps --verify
      - name: Reproduction driver smoke
        if: matrix.stack == 'current' && matrix.os == 'ubuntu-latest'
        run: python -m benchmarks.reproduce --quick
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.stack == 'current'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
